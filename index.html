            0% { transform: scale(0.33); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: scale(1.5); opacity: 0; }
        }
        .search-ripple {
            position: absolute;
            width: 80px;

            content: '';
            position: absolute;
            left: 15px;
            top: 24px;
            bottom: 0;
            width: 2px;
            background-color: #000000;
        }
        
        .step-line::after {
            content: '';
            position: absolute;
            left: 15px;
            top: 32px;
