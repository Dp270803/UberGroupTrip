    <script src="vendor/react-dom.development.js"></script>

        tailwind.config = {

                extend: {

                        uber: { black: '#000000', white: '#FFFFFF', gray: { 50: '#F6F6F6', 100: '#EEEEEE', 200: '#E2E2E2', 300: '#CBCBCB', 400: '#AFAFAF', 500: '#757575', 600: '#545454', 700: '#333333', 800: '#1B1B1B' }, green: '#276EF1', success: '#05A357', warning: '#FFC043', danger: '#E11900' }

    <style>
        * { -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background: #F6F6F6; overscroll-behavior: none; }
        @keyframes pop { 0%{transform:scale(.7);opacity:0} 100%{transform:scale(1);opacity:1} }
        @keyframes slideUp { 0%{transform:translateY(20px);opacity:0} 100%{transform:translateY(0);opacity:1} }
        @keyframes fadeIn { 0%{opacity:0} 100%{opacity:1} }
        @keyframes pulse-ring { 0%{transform:scale(.33);opacity:0} 50%{opacity:.4} 100%{transform:scale(1.6);opacity:0} }
        @keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
        @keyframes progress { 0%{width:0} 100%{width:100%} }
        @keyframes dotPulse { 0%,80%,100%{opacity:.3} 40%{opacity:1} }
        .anim-pop { animation: pop .4s ease-out both; }
        .anim-slide { animation: slideUp .5s ease-out both; }
        .anim-fade { animation: fadeIn .6s ease-out both; }
        .ripple { position:absolute;width:80px;height:80px;border:2px solid #000;border-radius:50%;animation:pulse-ring 2s cubic-bezier(.215,.61,.355,1) infinite; }
        .shimmer-bar { background: linear-gradient(90deg, #eee 25%, #ddd 50%, #eee 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
        .dot-pulse span { animation: dotPulse 1.4s infinite both; }
        .dot-pulse span:nth-child(2) { animation-delay: .2s; }
        .dot-pulse span:nth-child(3) { animation-delay: .4s; }
        .shadow-card { box-shadow: 0 2px 12px rgba(0,0,0,.06); }
        .shadow-heavy { box-shadow: 0 8px 30px rgba(0,0,0,.12); }
        .btn-press:active { transform: scale(.97); }
        input:focus { outline: none; }

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, createContext, useContext } = React;
const { createRoot } = ReactDOM;
const { MemoryRouter, Routes, Route, Link, useNavigate, useLocation } = ReactRouterDOM;

/* â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•

   â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• */
const TripContext = createContext();

const RIDERS = [
    { id:1, name:'Alex', last:'Johnson', me:true, img:'https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=100&h=100&fit=crop', pickup:'224 Battery St', status:'confirmed', vehicle:1 },
    { id:2, name:'Sarah', last:'Miller', img:'https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=100&h=100&fit=crop', pickup:'450 Post St', status:'confirmed', vehicle:1 },
    { id:3, name:'James', last:'Chen', img:'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=100&h=100&fit=crop', pickup:'1101 Van Ness Ave', status:'confirmed', vehicle:1 },
    { id:4, name:'Jordan', last:'Smith', img:'https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?w=100&h=100&fit=crop', pickup:'722 Market St', status:'confirmed', vehicle:2 },
    { id:5, name:'Sam', last:'Park', img:'https://images.unsplash.com/photo-1539571696357-5a69c17a67c6?w=100&h=100&fit=crop', pickup:'110 Pine St', status:'confirmed', vehicle:2 },
    { id:6, name:'Mia', last:'Davis', img:'https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=100&h=100&fit=crop', pickup:'88 Kearny St', status:'confirmed', vehicle:2 },
    { id:7, name:'Harvey', last:'Wong', img:'https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?w=100&h=100&fit=crop', pickup:'55 2nd St', status:'confirmed', vehicle:2 },
];

const DESTINATION = { name: 'Chase Center', address: '1 Warriors Way, San Francisco', eta: '8:42 PM' };
const TRIP_COST = 42.50;
const SAFETY_PIN = '4921';
const INVITE_URL = 'uber://group-trip/GT-8821';

const getVehiclePlan = (count) => {
    if (count <= 4) return [{ type:'UberX', capacity:4, price:TRIP_COST, icon:'directions_car', why:'The quickest, lowest-cost option for your group.' }];
    if (count <= 6) return [{ type:'UberXL', capacity:6, price:TRIP_COST, icon:'airport_shuttle', why:'One spacious vehicle keeps your group together.' }];
    if (count <= 8) return [
        { type:'UberX', capacity:4, price:18.20, icon:'directions_car', why:'Best balance of speed and cost for your party.' },
        { type:'UberXL', capacity:6, price:24.30, icon:'airport_shuttle', why:'Best balance of speed and cost for your party.' }
    ];
    return [
        { type:'UberXL', capacity:6, price:21.25, icon:'airport_shuttle', why:'Two coordinated XLs give everyone room.' },
        { type:'UberXL', capacity:6, price:21.25, icon:'airport_shuttle', why:'Two coordinated XLs give everyone room.' }
    ];
};

const shareInvite = async (addToast) => {
    const shareData = { title:'Join my Uber Group Trip', text:`Join Alex's ride to ${DESTINATION.name}`, url:INVITE_URL };
    try {
        if (navigator.share) await navigator.share(shareData);
        else if (navigator.clipboard) { await navigator.clipboard.writeText(INVITE_URL); addToast('Invite link copied  -  it expires in 60 minutes.', 'success'); }
        else addToast(`Invite link: ${INVITE_URL}`, 'info');
    } catch (error) {
        if (error.name !== 'AbortError') addToast('Invite link is ready to share.', 'success');
    }
};

function TripProvider({ children }) {
    const [riders, setRiders] = useState(RIDERS.slice(0, 1));
    const [tripState, setTripState] = useState('idle'); // idle, forming, planning, recommending, matching, confirmed, live, completing, complete
    const [v1Status, setV1Status] = useState('idle');
    const [v2Status, setV2Status] = useState('idle');
    const [pickupIndex, setPickupIndex] = useState(-1);
    const [toasts, setToasts] = useState([]);
    const [modals, setModals] = useState([]);

    const addToast = useCallback((msg, type='info') => {
        const id = Date.now();
        setToasts(t => [...t, { id, msg, type }]);
        setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3500);
    }, []);

    const showModal = useCallback((modal) => setModals(m => [...m, { ...modal, id: Date.now() }]), []);
    const dismissModal = useCallback((id) => setModals(m => m.filter(x => x.id !== id)), []);

    return (
        <TripContext.Provider value={{ riders, setRiders, tripState, setTripState, v1Status, setV1Status, v2Status, setV2Status, pickupIndex, setPickupIndex, toasts, addToast, modals, showModal, dismissModal, RIDERS_ALL: RIDERS }}>
            {children}
        </TripContext.Provider>
    );
}

/* â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•

const Icon = ({ name, fill, size=24, className='' }) => (
    <span className={`material-symbols-outlined ${className}`} style={{ fontSize: size, fontVariationSettings: fill ? "'FILL' 1" : "'FILL' 0" }}>{name}</span>
);

const TopBar = ({ title, back=true, right, statusLabel, onBack }) => {
    const nav = useNavigate();
    return (
        <header className="fixed top-0 z-50 w-full bg-white/90 backdrop-blur-md border-b border-uber-gray-100 px-4 h-14 flex items-center justify-between">
            <div className="flex items-center gap-3">
                {back && <button onClick={onBack || (() => nav(-1))} className="w-8 h-8 flex items-center justify-center rounded-full hover:bg-uber-gray-50 btn-press"><Icon name="arrow_back" size={20}/></button>}
                <h1 className="font-display font-bold text-base text-uber-black">{title}</h1>
            </div>
            <div className="flex items-center gap-2">
                {statusLabel && <span className="text-[11px] font-bold bg-uber-gray-100 px-2 py-0.5 rounded font-body uppercase tracking-wide">{statusLabel}</span>}
                {right || <button className="w-8 h-8 flex items-center justify-center rounded-full hover:bg-uber-gray-50"><Icon name="more_vert" size={20}/></button>}
            </div>
        </header>
    );
};

const BottomNav = ({ active='home' }) => {
    const items = [
        { id:'home', icon:'home', label:'Home', path:'/' },
        { id:'activity', icon:'history', label:'Activity', path:'/activity' },
        { id:'account', icon:'person', label:'Account', path:'/account' },
        { id:'safety', icon:'shield', label:'Safety', path:'/safety' },
    ];
    return (
        <nav className="fixed bottom-0 left-0 w-full bg-white border-t border-uber-gray-100 h-14 flex items-center justify-around z-50">
            {items.map(it => (
                <Link key={it.id} to={it.path} className={`flex flex-col items-center gap-0.5 ${active===it.id ? 'text-uber-black' : 'text-uber-gray-400'}`}>
                    <Icon name={it.icon} fill={active===it.id} size={22}/>
                    <span className="text-[10px] font-medium">{it.label}</span>
                </Link>
            ))}
        </nav>
    );
};

const Avatar = ({ src, name, size=40, badge, ring, className='' }) => (
    <div className={`relative shrink-0 ${className}`} style={{ width: size, height: size }}>
        <div className={`w-full h-full rounded-full bg-cover bg-center bg-uber-gray-100 ${ring ? 'ring-2 ring-uber-black ring-offset-1' : ''}`} style={{ backgroundImage: `url('${src}')` }} />
        {badge && <div className="absolute -bottom-0.5 -right-0.5 bg-uber-black text-white text-[8px] font-bold px-1 py-px rounded-full leading-tight">{badge}</div>}
    </div>
);

const Btn = ({ children, onClick, variant='primary', full=true, disabled=false, className='', icon }) => {
    const base = 'font-display font-bold rounded-xl flex items-center justify-center gap-2 btn-press transition-all';
    const sizes = 'h-12 px-6 text-sm';
    const variants = {
        primary: 'bg-uber-black text-white hover:bg-uber-gray-700',
        secondary: 'bg-uber-gray-50 text-uber-black border border-uber-gray-200 hover:bg-uber-gray-100',
        danger: 'bg-uber-danger text-white hover:opacity-90',
        ghost: 'bg-transparent text-uber-black hover:bg-uber-gray-50',
        success: 'bg-uber-success text-white hover:opacity-90',
    };
    return (
        <button onClick={onClick} disabled={disabled} className={`${base} ${sizes} ${variants[variant]} ${full?'w-full':''} ${disabled?'opacity-40 pointer-events-none':''} ${className}`}>
            {icon && <Icon name={icon} size={18}/>}
            {children}
        </button>
    );
};

const Card = ({ children, className='', onClick }) => (
    <div onClick={onClick} className={`bg-white rounded-xl border border-uber-gray-100 shadow-card ${onClick?'cursor-pointer hover:border-uber-gray-200 btn-press':''} ${className}`}>{children}</div>
);

const Toast = () => {
    const { toasts } = useContext(TripContext);
    return (
        <div className="fixed top-16 left-4 right-4 z-[100] flex flex-col gap-2">
            {toasts.map(t => (
                <div key={t.id} className={`anim-slide px-4 py-3 rounded-xl shadow-heavy flex items-center gap-3 text-sm font-medium ${t.type==='success'?'bg-uber-success text-white':t.type==='error'?'bg-uber-danger text-white':t.type==='warning'?'bg-uber-warning text-uber-black':'bg-uber-black text-white'}`}>
                    <Icon name={t.type==='success'?'check_circle':t.type==='error'?'error':t.type==='warning'?'warning':'info'} size={18} fill/>
                    {t.msg}
                </div>
            ))}
        </div>
    );
};

const Modal = () => {
    const { modals, dismissModal } = useContext(TripContext);
    if (!modals.length) return null;
    const m = modals[modals.length - 1];
    return (
        <div className="fixed inset-0 z-[90] flex items-end justify-center" onClick={() => dismissModal(m.id)}>
            <div className="absolute inset-0 bg-black/40 anim-fade"/>
            <div className="relative bg-white rounded-t-2xl w-full max-w-md p-6 pb-8 anim-slide" onClick={e => e.stopPropagation()}>
                {m.icon && <div className={`w-12 h-12 rounded-full flex items-center justify-center mb-4 ${m.iconBg||'bg-uber-gray-50'}`}><Icon name={m.icon} size={24} fill className={m.iconColor||''}/></div>}
                <h3 className="font-display font-bold text-lg mb-1">{m.title}</h3>
                <p className="text-sm text-uber-gray-500 mb-6">{m.body}</p>
                <div className="flex flex-col gap-2">
                    {m.actions?.map((a, i) => <Btn key={i} variant={a.variant||'primary'} onClick={() => { a.action?.(); dismissModal(m.id); }}>{a.label}</Btn>)}
                </div>
            </div>
        </div>
    );
};

                                    <span className="text-sm">Chase Center</span>
                                    <Icon name="close" size={16} className="text-uber-gray-400"/>

                    <button onClick={startTrip} className="bg-uber-black text-white rounded-xl p-4 text-left shadow-heavy btn-press relative overflow-hidden group">

};

   SCREEN 2  -  GROUP FORMATION
   â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• */
const FormationPage = () => {
    const nav = useNavigate();
    const { riders, setRiders, addToast, showModal, RIDERS_ALL } = useContext(TripContext);
    const [progress, setProgress] = useState(10);
    const [statusLog, setStatusLog] = useState([]);
    const joinIndex = useRef(1);

    useEffect(() => {
        const logs = ['Finding nearby pickups...', '', 'Recalculating route...', '', 'Optimizing vehicle selection...', '', 'Finalizing plan...'];
        let idx = 0;
        const interval = setInterval(() => {
            if (joinIndex.current < RIDERS_ALL.length) {
                const newRider = RIDERS_ALL[joinIndex.current];
                setRiders(prev => [...prev, newRider]);
                setStatusLog(prev => [...prev, { text: `${newRider.name} joined`, type: 'join' }]);
                joinIndex.current++;
                setProgress(p => Math.min(95, p + 12));
                setTimeout(() => {
                    if (logs[idx]) { setStatusLog(prev => [...prev, { text: logs[idx], type: 'system' }]); idx++; }
                    setProgress(p => Math.min(95, p + 5));
                }, 600);
            } else {
                clearInterval(interval);
                setProgress(100);
                setStatusLog(prev => [...prev, { text: 'Route optimized  -  ready to review', type: 'done' }]);
            }
        }, 1200);
        return () => clearInterval(interval);
    }, []);

    const handleRemoveRider = (rider) => {
        showModal({
            icon: 'person_remove', iconBg: 'bg-red-50', iconColor: 'text-uber-danger',
            title: `Remove ${rider.name}?`,
            body: `${rider.name} will be removed from the group and notified. The route will be recalculated.`,
            actions: [
                { label: 'Remove', variant: 'danger', action: () => { setRiders(prev => prev.filter(r => r.id !== rider.id)); addToast(`${rider.name} removed from trip`, 'warning'); }},
                { label: 'Cancel', variant: 'secondary' }
            ]
        });
    };

    const addNextRider = () => {
        const next = RIDERS_ALL.find(candidate => !riders.some(r => r.id === candidate.id));
        if (!next) return addToast('Everyone invited has already joined.', 'info');
        setRiders(prev => [...prev, next]);
        setStatusLog(prev => [...prev, { text: `${next.name} joined`, type: 'join' }, { text:'Recalculating route...', type:'system' }]);
        setProgress(p => Math.max(p, 65));
        addToast(`${next.name} joined your Group Trip`, 'success');
    };

    const openInvite = () => showModal({
        icon:'group_add', title:'Invite friends',
        body:'Share a link that opens this trip in Uber. Links expire 60 minutes after creation or when you confirm the plan.',
        actions:[
            { label:'Share invite link', action:() => shareInvite(addToast) },
            { label:'Simulate rider joining', variant:'secondary', action:addNextRider },
            { label:'Close', variant:'ghost' }
        ]
    });

    return (
        <div className="min-h-screen bg-uber-gray-50">
            <TopBar title="Group Trip" statusLabel="LIVE"/>
            <main className="pt-14 pb-16 relative min-h-screen flex flex-col">
                <MapBg opacity={35}/>
                <div className="flex-1"/>
                <div className="relative z-10 px-4 pb-6 flex flex-col gap-3">
                    {/* Status Feed */}
                    <Card className="p-4 relative overflow-hidden">
                        <div className="absolute top-0 left-0 w-full h-1 bg-uber-gray-100">
                            <div className="h-full bg-uber-black transition-all duration-700 ease-out" style={{width:`${progress}%`}}/>
                        </div>
                        <div className="pt-2 flex flex-col gap-1.5 max-h-32 overflow-y-auto">
                            {statusLog.slice(-5).map((s, i) => (
                                <div key={i} className={`flex items-center gap-2 text-xs anim-fade ${s.type==='done'?'text-uber-success font-bold':s.type==='join'?'text-uber-black':'text-uber-gray-400'}`} style={{animationDelay:`${i*.05}s`}}>
                                    <Icon name={s.type==='done'?'check_circle':s.type==='join'?'person_add':'sync'} size={14} fill={s.type==='done'}/>
                                    {s.text}
                                </div>
                            ))}
                            {progress < 100 && <div className="flex items-center gap-2 text-xs text-uber-black font-semibold">
                                <Icon name="sync" size={14} className="animate-spin"/>
                                Optimizing route for {riders.length} people...
                            </div>}
                        </div>
                    </Card>

                    {/* Participants */}
                    <Card className="p-4">
                        <div className="flex justify-between items-center mb-4">
                            <h2 className="font-display font-bold text-base">Participants</h2>
                            <span className="text-xs font-bold bg-uber-gray-100 px-2 py-1 rounded-full">{riders.length} Joined</span>
                        </div>
                        <div className="flex flex-wrap gap-4">
                            {riders.map((r, i) => (
                                <button key={r.id} onClick={() => !r.me && handleRemoveRider(r)} className="flex flex-col items-center gap-1 anim-pop" style={{animationDelay:`${i*.08}s`}}>
                                    <Avatar src={r.img} size={56} badge={r.me?'ME':null} ring={r.me}/>
                                    <span className="text-xs font-medium">{r.name}</span>
                                </button>
                            ))}
                            {riders.length < 12 && (
                                <div className="flex flex-col items-center gap-1">
                                    <button onClick={openInvite} aria-label="Invite more friends" className="w-14 h-14 rounded-full border-2 border-dashed border-uber-gray-300 flex items-center justify-center"><Icon name="add" size={20} className="text-uber-gray-400"/></button>
                                    <span className="text-xs text-uber-gray-400">Invite</span>
                                </div>
                            )}
                        </div>
                        <div className="border-t border-uber-gray-100 mt-4 pt-4 flex gap-2">
                            <Btn icon="share" variant="primary" onClick={openInvite}>Invite More Friends</Btn>
                        </div>
                    </Card>
                    {progress === 100 && <Card className="p-3 flex items-center gap-3 anim-slide">
                        <div className="w-9 h-9 rounded-full bg-uber-success/10 text-uber-success flex items-center justify-center"><Icon name="check_circle" size={20} fill/></div>
                        <div className="flex-1"><p className="text-sm font-bold">Ready to see your plan?</p><p className="text-[11px] text-uber-gray-500">Your latest pickups and fare estimate are ready.</p></div>
                    </Card>}
                    <Btn onClick={() => nav('/plan')} disabled={riders.length < 2}>
                        {riders.length < 2 ? 'Invite at least 1 rider' : progress < 100 ? 'See plan while optimizing' : 'View Recommended Plan'}
                    </Btn>
                </div>
            </main>
            <BottomNav active="activity"/>
        </div>
    );
};

const MatchingPage = () => {
    const nav = useNavigate();
    const { v1Status, setV1Status, v2Status, setV2Status, addToast, showModal, riders } = useContext(TripContext);
    const [elapsed, setElapsed] = useState(0);

    useEffect(() => {
        setV1Status('searching'); setV2Status('searching');
        const t1 = setTimeout(() => { setV1Status('matched'); addToast('Vehicle 1 matched  -  Michael, Toyota Camry', 'success'); }, 2500);
        const t2 = setTimeout(() => { setV2Status('matched'); addToast('Vehicle 2 matched  -  Sarah, Ford Explorer', 'success'); }, 5000);
        const t3 = setTimeout(() => nav('/confirmed'), 7000);
        const tick = setInterval(() => setElapsed(e => e + 1), 1000);
        return () => { clearTimeout(t1); clearTimeout(t2); clearTimeout(t3); clearInterval(tick); };
    }, []);

    const handleCancel = () => {
        showModal({
            icon: 'cancel', iconBg: 'bg-red-50', iconColor: 'text-uber-danger',

            body: `This will cancel the trip for all ${riders.length} riders. ${v1Status==='matched'?'A cancellation fee may apply since a driver has already been matched.':'No cancellation fee will be charged.'}`,

                        <span className={`text-[11px] font-bold uppercase ${status==='matched'?'text-uber-success':'text-uber-gray-400'}`}>
                            {status==='matched' ? 'Matched' : <span className="dot-pulse"><span>Â·</span><span>Â·</span><span>Â·</span></span>}
                        </span>
                    </div>
                    <p className="text-xs text-uber-gray-500 mt-0.5">{status==='matched' ? `${driver} Â· ${car}` : 'Finding nearby drivers...'}</p>

            </div>
        </div>
    );

    return (
        <div className="min-h-screen bg-uber-gray-50 overflow-hidden">
            <TopBar title="Group Trip" right={<span className="text-xs text-uber-gray-400 font-mono">{elapsed}s</span>}/>

                <MapBg opacity={40}/>
                <div className="absolute top-1/3 left-1/2 -translate-x-1/2 -translate-y-1/2">

                    <Card className="p-4">
                        <h2 className="font-display font-bold text-base mb-1">Assembling your trip...</h2>
                        <p className="text-xs text-uber-gray-500 mb-4">Coordinating 2 vehicles for {riders.length} riders</p>
                        <div className="space-y-3">
                            <VehicleCard num={1} type="UberX" status={v1Status} driver="Michael T." car="Toyota Camry"/>
                            <VehicleCard num={2} type="UberXL" status={v2Status} driver="Sarah K." car="Ford Explorer"/>
                        </div>
                        <div className="flex gap-2 mt-4">
                            <Btn variant="secondary" onClick={handleCancel} full={false} className="flex-1">Cancel</Btn>
                            <Btn variant="primary" onClick={() => addToast('Driver details and PIN sent to every rider.', 'success')} icon="notifications" full={false} className="flex-1" disabled={v1Status!=='matched'||v2Status!=='matched'}>Notify Group</Btn>

    );
};

                        {riders.map((r, i) => <TimelineItem key={r.id} avatar={r.img} name={`${r.name}${r.me?' (You)':''}`} address={`Pickup: ${r.pickup}`} time={`8:${10+i*6} PM`} status="upcoming" isLast={false}/>)}

                        <Card className="p-4"><Icon name="shield" size={19} className="text-uber-gray-500"/><p className="text-[11px] text-uber-gray-400 font-bold mt-3">Trip Safety</p><p className="font-display font-bold text-lg mt-0.5">PIN: {SAFETY_PIN}</p></Card>

};

/* â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
   SCREEN 6  -  TRIP ROOM
   â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â• */
const TripRoomPage = () => {
    const nav = useNavigate();
    const { riders, pickupIndex, setPickupIndex, addToast, showModal } = useContext(TripContext);
    const [messages, setMessages] = useState([
        { type:'system', text:'Trip started  -  Driver Michael is en route', icon:'directions_car', time:'8:05 PM' },
    ]);
    const [inputVal, setInputVal] = useState('');
    const chatRef = useRef(null);

    // Simulate live events
    useEffect(() => {
        const events = [
            { delay:2000, action:() => { setPickupIndex(0); setMessages(m=>[...m, {type:'system', text:`${riders[0]?.name} has been picked up`, icon:'check_circle', time:'8:12 PM'}]); }},
            { delay:4000, action:() => setMessages(m=>[...m, {type:'user', name:'Alex', text:"Hey Marcus, we have one extra suitcase. Hope that's okay!", time:'8:15 PM'}]) },
            { delay:6000, action:() => setMessages(m=>[...m, {type:'driver', name:'Michael', text:"No problem at all. Plenty of room.", time:'8:16 PM'}]) },
            { delay:8000, action:() => { setPickupIndex(1); setMessages(m=>[...m, {type:'system', text:`${riders[1]?.name} has been picked up`, icon:'check_circle', time:'8:22 PM'}]); addToast(`${riders[1]?.name} picked up!`, 'success'); }},
            { delay:10000, action:() => setMessages(m=>[...m, {type:'alert', text:'Driver is 2 minutes from next pickup', icon:'info', time:'8:28 PM'}]) },
            { delay:12000, action:() => { setPickupIndex(2); setMessages(m=>[...m, {type:'system', text:`${riders[2]?.name} has been picked up`, icon:'check_circle', time:'8:30 PM'}]); }},
        ];
        const timers = events.map(e => setTimeout(e.action, e.delay));
        return () => timers.forEach(clearTimeout);
    }, []);

    useEffect(() => { chatRef.current?.scrollTo(0, chatRef.current.scrollHeight); }, [messages]);

    const sendMsg = () => {
        if (!inputVal.trim()) return;
        setMessages(m => [...m, { type:'user', name:'Alex', text:inputVal, time:'Now' }]);
        setInputVal('');
    };

    const handleNoShow = (rider) => {
        showModal({
            icon:'person_off', iconBg:'bg-orange-50', iconColor:'text-uber-warning',
            title:`${rider.name} not at pickup?`,
            body:`The driver has waited 5 minutes. Skip this pickup and continue to the next rider?`,
            actions:[
                { label:`Skip ${rider.name}'s Pickup`, variant:'danger', action:() => { setPickupIndex(p=>p+1); addToast(`${rider.name}'s pickup skipped`, 'warning'); }},
                { label:'Wait 2 More Minutes', variant:'secondary' }
            ]
        });
    };

    const currentPickup = riders[Math.min(pickupIndex + 1, riders.length - 1)];
    const nextPickup = riders[Math.min(pickupIndex + 2, riders.length - 1)];

    return (
        <div className="min-h-screen bg-uber-gray-50 flex flex-col">
            <TopBar title="Trip Room" statusLabel="#GT-8821"/>
            <main className="flex-1 pt-14 pb-16 flex flex-col overflow-hidden">
                {/* Map + Driver */}
                <div className="relative h-52 shrink-0 overflow-hidden">
                    <MapBg grayscale={false} opacity={70}/>
                    <div className="absolute bottom-3 left-3 right-3 bg-white/95 backdrop-blur p-3 rounded-xl shadow-heavy flex items-center justify-between">
                        <div className="flex items-center gap-3">
                            <div className="relative">
                                <Avatar src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=100&h=100&fit=crop" size={44}/>
                                <div className="absolute -bottom-0.5 -right-0.5 bg-uber-success text-white p-0.5 rounded-full border-2 border-white"><Icon name="check" size={8}/></div>
                            </div>
                            <div>
                                <p className="text-sm font-bold">Michael T.</p>
                                <p className="text-[11px] text-uber-gray-500">Toyota Camry Â· KLU 992</p>
                            </div>
                        </div>
                        <div className="text-right">
                            <p className="text-[10px] text-uber-gray-400 uppercase">ETA</p>
                            <p className="font-display font-bold">4 min</p>
                        </div>
                    </div>
                </div>

                {/* Pickup Status */}
                <div className="px-4 mt-3 grid grid-cols-2 gap-2 shrink-0">
                    <div className="bg-white rounded-xl p-3 border border-uber-gray-100">
                        <p className="text-[10px] text-uber-gray-400 flex items-center gap-1"><Icon name="location_on" size={12} fill/> Current Pickup</p>
                        <p className="text-sm font-bold mt-1">{currentPickup?.name}</p>
                        <p className="text-[11px] text-uber-gray-500 truncate">{currentPickup?.pickup}</p>
                        <button onClick={() => handleNoShow(currentPickup)} className="text-[11px] text-uber-danger font-bold mt-2 flex items-center gap-1"><Icon name="report" size={12}/> Not here?</button>
                    </div>
                    <div className="bg-uber-gray-50 rounded-xl p-3 opacity-60">
                        <p className="text-[10px] text-uber-gray-400 flex items-center gap-1"><Icon name="fast_forward" size={12}/> Next Pickup</p>
                        <p className="text-sm font-bold mt-1">{nextPickup?.name}</p>
                        <p className="text-[11px] text-uber-gray-500 truncate">{nextPickup?.pickup}</p>
                    </div>
                </div>

                <div className="px-4 mt-3 shrink-0">
                    <Card className="p-3">
                        <p className="text-[10px] font-bold uppercase tracking-widest text-uber-gray-400 mb-2">Live pickup timeline</p>
                        <div className="flex gap-2 overflow-x-auto pb-1">{riders.map((r, i) => <div key={r.id} className="min-w-[78px] text-center"><div className={`mx-auto w-7 h-7 rounded-full flex items-center justify-center ${i<=pickupIndex?'bg-uber-success text-white':i===pickupIndex+1?'bg-uber-black text-white':'bg-uber-gray-100 text-uber-gray-400'}`}><Icon name={i<=pickupIndex?'check':i===pickupIndex+1?'directions_car':'schedule'} size={14}/></div><p className="text-[10px] font-semibold mt-1 truncate">{r.name}</p><p className="text-[9px] text-uber-gray-400">{i<=pickupIndex?'Picked up':i===pickupIndex+1?'Current':'Upcoming'}</p></div>)}<div className="min-w-[78px] text-center"><div className="mx-auto w-7 h-7 rounded-full bg-uber-gray-100 flex items-center justify-center"><Icon name="location_on" size={14}/></div><p className="text-[10px] font-semibold mt-1">Arrival</p><p className="text-[9px] text-uber-gray-400">{DESTINATION.eta}</p></div></div>
                    </Card>
                </div>

                {/* Chat */}
                <div className="flex-1 px-4 mt-3 flex flex-col min-h-0">
                    <h3 className="font-display font-bold text-sm mb-2 shrink-0">Trip Activity</h3>
                    <div ref={chatRef} className="flex-1 bg-white rounded-xl border border-uber-gray-100 p-3 overflow-y-auto flex flex-col gap-2">
                        {messages.map((msg, i) => {
                            if (msg.type==='system' || msg.type==='alert') return (
                                <div key={i} className="self-center anim-fade">
                                    <div className={`inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full text-[11px] font-medium ${msg.type==='alert'?'bg-uber-warning/10 text-uber-warning border border-uber-warning/20':'bg-uber-gray-50 text-uber-gray-600'}`}>
                                        <Icon name={msg.icon||'info'} size={13} fill/>{msg.text}
                                    </div>
                                </div>
                            );
                            const isMe = msg.type==='user' && msg.name==='Alex';
                            const isDriver = msg.type==='driver';
                            return (
                                <div key={i} className={`flex flex-col gap-0.5 max-w-[80%] anim-slide ${isMe||isDriver?'self-end items-end':'self-start items-start'}`}>
                                    <div className={`px-3 py-2 rounded-2xl text-sm ${isDriver?'bg-uber-black text-white rounded-br-sm':isMe?'bg-uber-gray-100 rounded-br-sm':'bg-uber-gray-100 rounded-bl-sm'}`}>{msg.text}</div>
                                    <span className="text-[10px] text-uber-gray-400">{msg.name}{isDriver?' (Driver)':''} Â· {msg.time}</span>
                                </div>
                            );
                        })}
                    </div>
                </div>

                {/* Input */}
                <div className="px-4 py-2 shrink-0">
                    <div className="flex gap-2 items-center bg-white rounded-xl border border-uber-gray-200 px-3 h-11">
                        <input value={inputVal} onChange={e=>setInputVal(e.target.value)} onKeyDown={e=>e.key==='Enter'&&sendMsg()} className="flex-1 text-sm bg-transparent border-none p-0" placeholder="Message group..."/>
                        <button aria-label="Attach a photo" onClick={() => addToast('Photo attachment ready.', 'info')} className="text-uber-gray-500"><Icon name="add_photo_alternate" size={19}/></button>
                        <button onClick={sendMsg} className="text-uber-black"><Icon name="send" size={20} fill/></button>
                    </div>
                </div>

                {/* Simulate Arrival */}
                <div className="px-4 pb-2 shrink-0 flex gap-2">
                    <Btn variant="secondary" onClick={() => showModal({icon:'emergency',iconBg:'bg-red-50',iconColor:'text-uber-danger',title:'Safety emergency',body:'Contact emergency services or Uber Safety. Your Group Trip will continue for other vehicles.',actions:[{label:'Call emergency services',variant:'danger',action:()=>addToast('Emergency support contacted.', 'error')},{label:'Cancel',variant:'secondary'}]})} full={false} className="px-3" icon="emergency">Safety</Btn>
                    <Btn variant="secondary" onClick={() => nav('/complete')}>Simulate Arrival</Btn>
                </div>
            </main>
        </div>
    );
};

                    <div className="flex justify-between items-center">

                        <div className="text-right">
                            <p className="text-xs text-uber-gray-400">Total trip</p>
                            <p className="font-display font-bold text-xl">${TRIP_COST}</p>
                        </div>

                    <div className="flex items-center gap-2 mt-3 p-2 bg-uber-gray-50 rounded-lg">

                    </div>
                </Card>

                <Card className="p-4 flex gap-3 mb-4">
                    <Icon name="archive" size={18} className="text-uber-gray-400 mt-0.5 shrink-0"/>

                </Card>

                {/* Rating Prompt */}
                <Card className="p-4 mb-4 text-center">
                    <p className="text-sm font-semibold mb-2">How was your Group Trip?</p>
                    <div className="flex justify-center gap-1">
                        {[1,2,3,4,5].map(s => <button key={s} className="p-1 hover:scale-110 transition-transform"><Icon name="star" size={28} fill={s<=4} className={s<=4?'text-uber-black':'text-uber-gray-200'}/></button>)}
                    </div>
                </Card>

                <Btn onClick={() => nav('/')}>Done</Btn>
            </main>
        </div>
    );
};
