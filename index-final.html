    { id:3, name:'James', last:'Chen', img:'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=100&h=100&fit=crop', pickup:'1101 Van Ness Ave', neighborhood:'Haight-Ashbury', distFromDest:5.1, soloFare:14.80, status:'confirmed', vehicle:1 },
    { id:4, name:'Jordan', last:'Smith', img:'https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?w=100&h=100&fit=crop', pickup:'722 Market St', neighborhood:'Mission District', distFromDest:3.4, soloFare:10.90, status:'confirmed', vehicle:2 },

    { id:7, name:'Harvey', last:'Wong', img:'https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?w=100&h=100&fit=crop', pickup:'55 2nd St', neighborhood:'SoMa', distFromDest:2.0, soloFare:7.80, status:'confirmed', vehicle:2 },

const DESTINATION = { name: 'Chase Center', address: '1 Warriors Way, San Francisco', eta: '8:42 PM' };

const getGroupDiscount = (count) => {
    if (count <= 3) return 0.05;
    if (count <= 5) return 0.08;
    if (count <= 8) return 0.12;
    return 0.15;
};

const computeSegmentPricing = (riders) => {
    const sorted = [...riders].sort((a, b) => b.distFromDest - a.distFromDest);
    if (sorted.length < 2) return { sorted, segments: [], perRider: {}, groupTotal: 0, discountedTotal: 0, discount: 0, soloTotal: 0, savings: 0 };

    const segmentFares = [];
    for (let i = 0; i < sorted.length; i++) {
        const from = sorted[i];
        const to = i < sorted.length - 1 ? sorted[i + 1] : null;
        const dist = to ? Math.abs(from.distFromDest - to.distFromDest) : from.distFromDest;
        const fare = parseFloat((2.50 + dist * 1.80 + dist * 0.35).toFixed(2));
        segmentFares.push({
            index: i,
            from: from.name,
            to: to ? to.name : DESTINATION.name,
            distance: dist.toFixed(1),
            fare,
            ridersInVehicle: i + 1,
        });
    }

    const perRider = {};
    sorted.forEach((rider) => { perRider[rider.id] = { total: 0, legs: [], soloFare: rider.soloFare }; });

    segmentFares.forEach((seg, segIdx) => {
        const ridersPresent = sorted.slice(0, segIdx + 1);
        const perPersonCost = parseFloat((seg.fare / ridersPresent.length).toFixed(2));
        ridersPresent.forEach(r => {
            perRider[r.id].total += perPersonCost;
            perRider[r.id].legs.push({
                from: seg.from,
                to: seg.to,
                segFare: seg.fare,
                yourShare: perPersonCost,
                ridersInVehicle: ridersPresent.length,
            });
        });
    });

    Object.keys(perRider).forEach(id => { perRider[id].total = parseFloat(perRider[id].total.toFixed(2)); });

    const groupTotal = parseFloat(segmentFares.reduce((s, seg) => s + seg.fare, 0).toFixed(2));
    const discountRate = getGroupDiscount(sorted.length);
    const discountAmount = parseFloat((groupTotal * discountRate).toFixed(2));
    const discountedTotal = parseFloat((groupTotal - discountAmount).toFixed(2));
    const soloTotal = sorted.reduce((s, r) => s + r.soloFare, 0);
    const savings = parseFloat((soloTotal - discountedTotal).toFixed(2));

    Object.keys(perRider).forEach(id => {
        const pr = perRider[id];
        pr.discountedTotal = parseFloat((pr.total * (1 - discountRate)).toFixed(2));
        pr.savings = parseFloat((pr.soloFare - pr.discountedTotal).toFixed(2));
        pr.savingsPct = Math.round((pr.savings / pr.soloFare) * 100);
        pr.discountAmount = parseFloat((pr.total * discountRate).toFixed(2));
    });

    const costs = Object.values(perRider).map(p => p.discountedTotal);
    const minCost = Math.min(...costs);
    const maxCost = Math.max(...costs);

    return { sorted, segments: segmentFares, perRider, groupTotal, discountedTotal, discount: discountRate, discountAmount, soloTotal, savings, savingsPct: Math.round((savings / soloTotal) * 100), minCost, maxCost };
};

const getVehiclePlan = (count) => {
    if (count <= 4) return [{ type:'UberX', capacity:4, icon:'directions_car', why:'The quickest, lowest-cost option for your group.' }];
    if (count <= 6) return [{ type:'UberXL', capacity:6, icon:'airport_shuttle', why:'One spacious vehicle keeps your group together.' }];
    if (count <= 8) return [
        { type:'UberX', capacity:4, icon:'directions_car', why:'Best balance of speed and cost for your party.' },
        { type:'UberXL', capacity:6, icon:'airport_shuttle', why:'Best balance of speed and cost for your party.' }
    ];
    return [
        { type:'UberXL', capacity:6, icon:'airport_shuttle', why:'Two coordinated XLs give everyone room.' },
        { type:'UberXL', capacity:6, icon:'airport_shuttle', why:'Two coordinated XLs give everyone room.' }
    ];
};

const DETOUR_THRESHOLD_MILES = 3;
const DETOUR_THRESHOLD_MINS = 15;

const checkDetourWarning = (rider, riders) => {
    if (riders.length < 2) return null;
    const sorted = [...riders].sort((a, b) => b.distFromDest - a.distFromDest);
    const idx = sorted.findIndex(r => r.id === rider.id);
    if (idx <= 0) return null;
    const prev = sorted[idx - 1];
    const detourMiles = Math.abs(prev.distFromDest - rider.distFromDest);
    if (detourMiles > DETOUR_THRESHOLD_MILES) {
        return `${rider.name}'s pickup adds ${detourMiles.toFixed(1)} mi detour. Consider a separate ride?`;
    }
    return null;
};

const shareInvite = async (addToast) => {
    const shareData = { title:'Join my Uber Group Trip', text:`Join Alex's ride to ${DESTINATION.name}`, url:INVITE_URL };
    try {
        if (navigator.share) await navigator.share(shareData);
        else if (navigator.clipboard) { await navigator.clipboard.writeText(INVITE_URL); addToast('Invite link copied  -  it expires in 60 minutes.', 'success'); }
        else addToast(`Invite link: ${INVITE_URL}`, 'info');
    } catch (error) {
        if (error.name !== 'AbortError') addToast('Invite link is ready to share.', 'success');
    }
};

/* ═══════════════════════════════════════════
   GLOBAL STATE CONTEXT
   ═══════════════════════════════════════════ */
const TripContext = createContext();

function TripProvider({ children }) {
    const [riders, setRiders] = useState(RIDERS_ALL.slice(0, 1));
    const [tripState, setTripState] = useState('idle');
    const [v1Status, setV1Status] = useState('idle');
    const [v2Status, setV2Status] = useState('idle');
    const [pickupIndex, setPickupIndex] = useState(-1);
    const [toasts, setToasts] = useState([]);
    const [modals, setModals] = useState([]);

    const addToast = useCallback((msg, type='info') => {
        const id = Date.now();
        setToasts(t => [...t, { id, msg, type }]);
        setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3500);
    }, []);

    const showModal = useCallback((modal) => setModals(m => [...m, { ...modal, id: Date.now() }]), []);
    const dismissModal = useCallback((id) => setModals(m => m.filter(x => x.id !== id)), []);

    const pricing = computeSegmentPricing(riders);

    return (
        <TripContext.Provider value={{ riders, setRiders, tripState, setTripState, v1Status, setV1Status, v2Status, setV2Status, pickupIndex, setPickupIndex, toasts, addToast, modals, showModal, dismissModal, RIDERS_ALL, pricing }}>
            {children}
        </TripContext.Provider>
    );
}

const FormationPage = () => {
    const nav = useNavigate();
    const { riders, setRiders, addToast, showModal, pricing } = useContext(TripContext);
    const [progress, setProgress] = useState(10);
    const [statusLog, setStatusLog] = useState([]);
    const [declinedRiders, setDeclinedRiders] = useState([]);
    const joinIndex = useRef(1);

    useEffect(() => {
        const logs = ['Finding nearby pickups...', '', 'Recalculating route...', '', 'Optimizing vehicle selection...', '', 'Finalizing plan...'];
        let idx = 0;
        const interval = setInterval(() => {
            if (joinIndex.current < RIDERS_ALL.length) {
                const newRider = RIDERS_ALL[joinIndex.current];
                setRiders(prev => prev.some(r => r.id === newRider.id) ? prev : [...prev, newRider]);
                setStatusLog(prev => [...prev, { text: `${newRider.name} joined (${newRider.distFromDest} mi from destination${joinIndex.current === 1 ? ' - farthest so far' : ''})`, type: 'join' }]);
                joinIndex.current++;
                setProgress(p => Math.min(95, p + 12));

                const warning = checkDetourWarning(newRider, [...riders, newRider]);
                if (warning) {
                    setTimeout(() => setStatusLog(prev => [...prev, { text: warning, type: 'warning' }]), 400);
                }

                setTimeout(() => {
                    if (logs[idx]) { setStatusLog(prev => [...prev, { text: logs[idx], type: 'system' }]); idx++; }
                    setProgress(p => Math.min(95, p + 5));
                }, 600);
            } else {
                clearInterval(interval);
                setProgress(100);
                setStatusLog(prev => [...prev, { text: 'Route optimized  -  ready to review', type: 'done' }]);
            }
        }, 1200);
        return () => clearInterval(interval);
    }, []);

    const handleRemoveRider = (rider) => {
        showModal({
            icon: 'person_remove', iconBg: 'bg-red-50', iconColor: 'text-uber-danger',
            title: `Remove ${rider.name}?`,
            body: `${rider.name} will be removed from the group and notified. The route and segment fares will be recalculated.`,
            actions: [
                { label: 'Remove', variant: 'danger', action: () => {
                    setRiders(prev => prev.filter(r => r.id !== rider.id));
                    setDeclinedRiders(prev => [...prev, rider]);
                    setTimeout(() => setDeclinedRiders(prev => prev.filter(r => r.id !== rider.id)), 3000);
                    addToast(`${rider.name} removed from trip`, 'warning');
                }},
                { label: 'Cancel', variant: 'secondary' }
            ]
        });
    };

    const addNextRider = () => {
        const next = RIDERS_ALL.find(candidate => !riders.some(r => r.id === candidate.id));
        if (!next) return addToast('Everyone invited has already joined.', 'info');
        setRiders(prev => [...prev, next]);
        setStatusLog(prev => [...prev, { text: `${next.name} joined (${next.distFromDest} mi from destination)`, type: 'join' }, { text:'Recalculating route segments...', type:'system' }]);
        setProgress(p => Math.max(p, 65));
        addToast(`${next.name} joined your Group Trip`, 'success');
    };

    const openInvite = () => showModal({
        icon:'group_add', title:'Invite friends',
        body:'Share a link that opens this trip in Uber. Links expire 60 minutes after creation or when you confirm the plan.',
        actions:[
            { label:'Share invite link', action:() => shareInvite(addToast) },
            { label:'Simulate rider joining', variant:'secondary', action:addNextRider },
            { label:'Close', variant:'ghost' }
        ]
    });

    return (
        <div className="min-h-screen bg-uber-gray-50">
            <TopBar title="Group Trip" statusLabel="LIVE"/>
            <main className="pt-14 pb-16 relative min-h-screen flex flex-col">
                <MapBg opacity={35}/>
                <div className="flex-1"/>
                <div className="relative z-10 px-4 pb-6 flex flex-col gap-3">
                    {/* Status Feed */}
                    <Card className="p-4 relative overflow-hidden">
                        <div className="absolute top-0 left-0 w-full h-1 bg-uber-gray-100">
                            <div className="h-full bg-uber-black transition-all duration-700 ease-out" style={{width:`${progress}%`}}/>
                        </div>
                        <div className="pt-2 flex flex-col gap-1.5 max-h-32 overflow-y-auto">
                            {statusLog.slice(-5).map((s, i) => (
                                <div key={i} className={`flex items-center gap-2 text-xs anim-fade ${s.type==='done'?'text-uber-success font-bold':s.type==='join'?'text-uber-black':s.type==='warning'?'text-uber-warning font-medium':'text-uber-gray-400'}`} style={{animationDelay:`${i*.05}s`}}>
                                    <Icon name={s.type==='done'?'check_circle':s.type==='join'?'person_add':s.type==='warning'?'warning':'sync'} size={14} fill={s.type==='done'}/>
                                    {s.text}
                                </div>
                            ))}
                            {progress < 100 && <div className="flex items-center gap-2 text-xs text-uber-black font-semibold">
                                <Icon name="sync" size={14} className="animate-spin"/>
                                Optimizing route for {riders.length} people...
                            </div>}
                        </div>
                    </Card>

                    {/* Participants */}
                    <Card className="p-4">
                        <div className="flex justify-between items-center mb-4">
                            <h2 className="font-display font-bold text-base">Participants</h2>
                            <span className="text-xs font-bold bg-uber-gray-100 px-2 py-1 rounded-full">{riders.length} Joined</span>
                        </div>
                        <div className="flex flex-wrap gap-4">
                            {riders.map((r, i) => (
                                <button key={r.id} onClick={() => !r.me && handleRemoveRider(r)} className="flex flex-col items-center gap-1 anim-pop" style={{animationDelay:`${i*.08}s`}}>
                                    <Avatar src={r.img} size={56} badge={r.me?'ME':null} ring={r.me}/>
                                    <span className="text-xs font-medium">{r.name}</span>
                                    <span className="text-[10px] text-uber-gray-400">{r.distFromDest} mi</span>
                                </button>
                            ))}
                            {declinedRiders.map((r) => (
                                <div key={`dec-${r.id}`} className="flex flex-col items-center gap-1 anim-fade">
                                    <Avatar src={r.img} size={56} grayscale/>
                                    <span className="text-xs text-uber-gray-400 line-through">{r.name}</span>
                                </div>
                            ))}
                            {riders.length < 12 && (
                                <div className="flex flex-col items-center gap-1">
                                    <button onClick={openInvite} aria-label="Invite more friends" className="w-14 h-14 rounded-full border-2 border-dashed border-uber-gray-300 flex items-center justify-center"><Icon name="add" size={20} className="text-uber-gray-400"/></button>
                                    <span className="text-xs text-uber-gray-400">Invite</span>
                                </div>
                            )}
                        </div>
                        <div className="border-t border-uber-gray-100 mt-4 pt-4 flex gap-2">
                            <Btn icon="share" variant="primary" onClick={openInvite}>Invite More Friends</Btn>
                        </div>
                    </Card>

                    {/* Live pricing preview */}
                    {riders.length >= 2 && <Card className="p-3 flex items-center gap-3 anim-slide">
                        <div className="w-9 h-9 rounded-full bg-uber-gray-50 flex items-center justify-center"><Icon name="savings" size={18} className="text-uber-success"/></div>
                        <div className="flex-1">
                            <p className="text-xs font-bold">Est. ${pricing.discountedTotal.toFixed(2)} total</p>
                            <p className="text-[10px] text-uber-gray-500">${pricing.minCost?.toFixed(2)} - ${pricing.maxCost?.toFixed(2)} per person | Save ${pricing.savings.toFixed(2)} vs solo ({pricing.savingsPct}%)</p>
                        </div>
                    </Card>}

                    {progress === 100 && <Card className="p-3 flex items-center gap-3 anim-slide">
                        <div className="w-9 h-9 rounded-full bg-uber-success/10 text-uber-success flex items-center justify-center"><Icon name="check_circle" size={20} fill/></div>
                        <div className="flex-1"><p className="text-sm font-bold">Ready to see your plan?</p><p className="text-[11px] text-uber-gray-500">Your optimized pickups, segment fares, and savings are ready.</p></div>
                    </Card>}
                    <Btn onClick={() => nav('/plan')} disabled={riders.length < 2}>
                        {riders.length < 2 ? 'Invite at least 1 rider' : progress < 100 ? 'See plan while optimizing' : 'View Recommended Plan'}
                    </Btn>
                </div>
            </main>
            <BottomNav active="activity"/>
        </div>
    );
};

const MatchingPage = () => {
    const nav = useNavigate();
    const { v1Status, setV1Status, v2Status, setV2Status, addToast, showModal, riders, pricing } = useContext(TripContext);
    const [elapsed, setElapsed] = useState(0);
    const farthest = pricing.sorted[0];

    useEffect(() => {
        setV1Status('searching'); setV2Status('searching');
        const t1 = setTimeout(() => { setV1Status('matched'); addToast(`Vehicle 1 matched  -  Michael T., 3 min from ${farthest?.name}'s pickup`, 'success'); }, 2500);
        const t2 = setTimeout(() => { setV2Status('matched'); addToast('Vehicle 2 matched  -  Sarah K., Ford Explorer', 'success'); }, 5000);
        const t3 = setTimeout(() => nav('/confirmed'), 7000);
        const tick = setInterval(() => setElapsed(e => e + 1), 1000);
        return () => { clearTimeout(t1); clearTimeout(t2); clearTimeout(t3); clearInterval(tick); };
    }, []);

    const handleCancel = () => {
        showModal({
            icon: 'cancel', iconBg: 'bg-red-50', iconColor: 'text-uber-danger',
            title: 'Cancel Group Trip?',
            body: `This will cancel the trip for all ${riders.length} riders. ${v1Status==='matched'?'A cancellation fee may apply since a driver has already been matched.':'No cancellation fee will be charged.'}`,
            actions: [
                { label: 'Cancel Trip', variant: 'danger', action: () => { setV1Status('idle'); setV2Status('idle'); nav('/'); }},
                { label: 'Keep Waiting', variant: 'secondary' }
            ]
        });
    };

    const handleTimeout = (vehicleNum) => {
        showModal({
            icon: 'hourglass_top', iconBg: 'bg-orange-50', iconColor: 'text-uber-warning',
            title: `Vehicle ${vehicleNum} taking longer than usual`,
            body: `We're still searching for a driver near ${farthest?.name}'s pickup in ${farthest?.neighborhood}. This may take a moment.`,
            actions: [
                { label: 'Keep Waiting', variant: 'primary' },
                { label: 'Try Different Vehicle Type', variant: 'secondary' },
                { label: 'Cancel', variant: 'ghost', action: handleCancel }
            ]
        });
    };

    const VehicleCard = ({ num, type, status, driver, car, pickupNear }) => (
        <div className={`p-4 rounded-xl border relative overflow-hidden transition-all duration-500 ${status==='matched'?'bg-white border-uber-gray-100':'bg-uber-gray-50 border-uber-gray-200'}`}>
            {status==='searching' && <div className="absolute bottom-0 left-0 w-full h-1 shimmer-bar"/>}
            <div className="flex items-center gap-3">
                <div className={`w-12 h-12 rounded-full flex items-center justify-center relative transition-colors ${status==='matched'?'bg-uber-black text-white':'bg-uber-gray-200 text-uber-gray-500'}`}>
                    <Icon name={num===1?'directions_car':'airport_shuttle'} size={22}/>
                    {status==='matched' && <div className="absolute -bottom-0.5 -right-0.5 bg-uber-success text-white rounded-full w-5 h-5 flex items-center justify-center border-2 border-white"><Icon name="check" size={10}/></div>}
                </div>
                <div className="flex-1">
                    <div className="flex justify-between items-center">
                        <span className="text-sm font-bold">Vehicle {num} - {type}</span>
                        <span className={`text-[11px] font-bold uppercase ${status==='matched'?'text-uber-success':'text-uber-gray-400'}`}>
                            {status==='matched' ? 'Matched' : <span className="dot-pulse"><span>.</span><span>.</span><span>.</span></span>}
                        </span>
                    </div>
                    <p className="text-xs text-uber-gray-500 mt-0.5">
                        {status==='matched' ? `${driver} - ${car}` : `Finding driver near ${pickupNear}'s pickup...`}
                    </p>
                    {status==='matched' && <p className="text-[10px] text-uber-success mt-0.5">Near {pickupNear}'s pickup</p>}
                </div>
            </div>
        </div>
    );

    return (
        <div className="min-h-screen bg-uber-gray-50 overflow-hidden">
            <TopBar title="Group Trip" right={<span className="text-xs text-uber-gray-400 font-mono">{elapsed}s</span>}/>
            <main className="relative h-screen pt-14">
                <MapBg opacity={40}/>
                <div className="absolute top-1/3 left-1/2 -translate-x-1/2 -translate-y-1/2">
                    <div className="ripple"/><div className="ripple" style={{animationDelay:'.6s'}}/>
                    <div className="w-4 h-4 bg-uber-black rounded-full relative z-10 border-2 border-white"/>
                </div>
                <div className="absolute inset-x-0 bottom-0 p-4 pb-6 flex flex-col gap-3">
                    <Card className="p-4">
                        <h2 className="font-display font-bold text-base mb-1">Assembling your trip...</h2>
                        <p className="text-xs text-uber-gray-500 mb-4">Coordinating {getVehiclePlan(riders.length).length} vehicle{getVehiclePlan(riders.length).length>1?'s':''} for {riders.length} riders</p>
                        <div className="space-y-3">
                            <VehicleCard num={1} type="UberX" status={v1Status} driver="Michael T." car="Toyota Camry" pickupNear={farthest?.name || 'Sarah'}/>
                            <VehicleCard num={2} type="UberXL" status={v2Status} driver="Sarah K." car="Ford Explorer" pickupNear={pricing.sorted[Math.floor(pricing.sorted.length/2)]?.name || 'Jordan'}/>
                        </div>
                        <div className="flex gap-2 mt-4">
                            <Btn variant="secondary" onClick={handleCancel} full={false} className="flex-1">Cancel</Btn>
                            <Btn variant="primary" onClick={() => addToast(`Driver details and PIN (${SAFETY_PIN}) sent to every rider.`, 'success')} icon="notifications" full={false} className="flex-1" disabled={v1Status!=='matched'||v2Status!=='matched'}>Notify Group</Btn>
                        </div>
                        {elapsed > 8 && (v1Status !== 'matched' || v2Status !== 'matched') && (
                            <button onClick={() => handleTimeout(v1Status!=='matched'?1:2)} className="mt-3 text-xs text-uber-warning font-bold flex items-center gap-1 justify-center w-full">
                                <Icon name="hourglass_top" size={14}/> Taking longer than usual?
                            </button>
                        )}
                    </Card>
                </div>
            </main>
        </div>
    );
};

const TripRoomPage = () => {
    const nav = useNavigate();
    const { riders, pickupIndex, setPickupIndex, addToast, showModal, pricing } = useContext(TripContext);
    const [messages, setMessages] = useState([
        { type:'system', text:'Trip started  -  Driver Michael is en route to first pickup', icon:'directions_car', time:'8:05 PM' },
    ]);
    const [inputVal, setInputVal] = useState('');
    const chatRef = useRef(null);
    const [allAboard, setAllAboard] = useState(false);

    useEffect(() => {
        const seg0 = pricing.segments[0];
        const events = [
            { delay:2000, action:() => {
                setPickupIndex(0);
                setMessages(m=>[...m,
                    {type:'system', text:`${pricing.sorted[0]?.name} has been picked up`, icon:'check_circle', time:'8:12 PM'},
                    {type:'system', text:`Leg 1 complete - Segment fare: $${seg0?.fare.toFixed(2)}`, icon:'receipt', time:'8:12 PM'}
                ]);
            }},
            { delay:4000, action:() => setMessages(m=>[...m, {type:'user', name:'Alex', text:"Hey Michael, we have one extra suitcase. Hope that's okay!", time:'8:15 PM'}]) },
            { delay:6000, action:() => setMessages(m=>[...m, {type:'driver', name:'Michael', text:"No problem at all. Plenty of room.", time:'8:16 PM'}]) },
            { delay:8000, action:() => {
                setPickupIndex(1);
                const seg1 = pricing.segments[1];
                setMessages(m=>[...m,
                    {type:'system', text:`${pricing.sorted[1]?.name} has been picked up`, icon:'check_circle', time:'8:22 PM'},
                    {type:'system', text:`Leg 2 complete - Segment fare: $${seg1?.fare.toFixed(2)} - Next: ${pricing.sorted[2]?.name}`, icon:'receipt', time:'8:22 PM'}
                ]);
                addToast(`${pricing.sorted[1]?.name} picked up!`, 'success');
            }},
            { delay:10000, action:() => setMessages(m=>[...m, {type:'alert', text:'Driver is 2 minutes from next pickup', icon:'info', time:'8:28 PM'}]) },
            { delay:12000, action:() => {
                setPickupIndex(2);
                setMessages(m=>[...m,
                    {type:'system', text:`${pricing.sorted[2]?.name} has been picked up`, icon:'check_circle', time:'8:30 PM'},
                ]);
            }},
            { delay:14000, action:() => {
                setMessages(m=>[...m, {type:'alert', text:`Route adjusted due to traffic on Market St - Updated fare: +$0.80`, icon:'traffic', time:'8:33 PM'}]);
            }},
            { delay:16000, action:() => {
                if (pricing.sorted.length > 3) {
                    setPickupIndex(pricing.sorted.length - 1);
                    setMessages(m=>[...m,
                        {type:'system', text:`${pricing.sorted[pricing.sorted.length-1]?.name} has been picked up`, icon:'check_circle', time:'8:36 PM'},
                        {type:'system', text:`Everyone is on board! Final leg to ${DESTINATION.name}`, icon:'groups', time:'8:36 PM'},
                    ]);
                    setAllAboard(true);
                }
            }},
        ];
        const timers = events.map(e => setTimeout(e.action, e.delay));
        return () => timers.forEach(clearTimeout);
    }, []);

    useEffect(() => { chatRef.current?.scrollTo(0, chatRef.current.scrollHeight); }, [messages]);

    const sendMsg = () => {
        if (!inputVal.trim()) return;
        setMessages(m => [...m, { type:'user', name:'Alex', text:inputVal, time:'Now' }]);
        setInputVal('');
    };

    const handleNoShow = (rider) => {
        showModal({
            icon:'person_off', iconBg:'bg-orange-50', iconColor:'text-uber-warning',
            title:`${rider.name} not at pickup?`,
            body:`The driver has waited 5 minutes. Skip this pickup and continue to the next rider? No-show rider will be charged their segment fare as a cancellation fee.`,
            actions:[
                { label:`Skip ${rider.name}'s Pickup`, variant:'danger', action:() => { setPickupIndex(p=>p+1); addToast(`${rider.name}'s pickup skipped - cancellation fee applied`, 'warning'); }},
                { label:'Wait 2 More Minutes', variant:'secondary' }
            ]
        });
    };

    const currentIdx = Math.min(pickupIndex + 1, pricing.sorted.length - 1);
    const nextIdx = Math.min(pickupIndex + 2, pricing.sorted.length - 1);
    const currentPickup = pricing.sorted[currentIdx];
    const nextPickup = pricing.sorted[nextIdx];

    return (
        <div className="min-h-screen bg-uber-gray-50 flex flex-col">
            <TopBar title="Trip Room" statusLabel="#GT-8821"/>
            <main className="flex-1 pt-14 pb-16 flex flex-col overflow-hidden">
                {/* Map + Driver with rating and plate */}
                <div className="relative h-52 shrink-0 overflow-hidden">
                    <MapBg grayscale={false} opacity={70}/>
                    <div className="absolute bottom-3 left-3 right-3 bg-white/95 backdrop-blur p-3 rounded-xl shadow-heavy flex items-center justify-between">
                        <div className="flex items-center gap-3">
                            <div className="relative">
                                <Avatar src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=100&h=100&fit=crop" size={44}/>
                                <div className="absolute -bottom-0.5 -right-0.5 bg-uber-success text-white p-0.5 rounded-full border-2 border-white"><Icon name="check" size={8}/></div>
                            </div>
                            <div>
                                <p className="text-sm font-bold">Michael T. <span className="text-[10px] text-uber-gray-400 font-normal ml-1">4.92 &#9733;</span></p>
                                <p className="text-[11px] text-uber-gray-500">Toyota Camry - <span className="font-bold">KLU 992</span></p>
                                <p className="text-[10px] text-uber-gray-400">PIN: {SAFETY_PIN}</p>
                            </div>
                        </div>
                        <div className="text-right">
                            <p className="text-[10px] text-uber-gray-400 uppercase">ETA</p>
                            <p className="font-display font-bold">4 min</p>
                        </div>
                    </div>
                </div>

                {/* Pickup Status */}
                <div className="px-4 mt-3 grid grid-cols-2 gap-2 shrink-0">
                    <div className="bg-white rounded-xl p-3 border border-uber-gray-100">
                        <p className="text-[10px] text-uber-gray-400 flex items-center gap-1"><Icon name="location_on" size={12} fill/> Current Pickup</p>
                        <p className="text-sm font-bold mt-1">{currentPickup?.name}</p>
                        <p className="text-[11px] text-uber-gray-500 truncate">{currentPickup?.pickup}</p>
                        {!allAboard && <button onClick={() => handleNoShow(currentPickup)} className="text-[11px] text-uber-danger font-bold mt-2 flex items-center gap-1"><Icon name="report" size={12}/> Not here?</button>}
                    </div>
                    <div className="bg-uber-gray-50 rounded-xl p-3 opacity-60">
                        <p className="text-[10px] text-uber-gray-400 flex items-center gap-1"><Icon name="fast_forward" size={12}/> {allAboard ? 'Destination' : 'Next Pickup'}</p>
                        <p className="text-sm font-bold mt-1">{allAboard ? DESTINATION.name : nextPickup?.name}</p>
                        <p className="text-[11px] text-uber-gray-500 truncate">{allAboard ? DESTINATION.address : nextPickup?.pickup}</p>
                    </div>
                </div>

                <div className="px-4 mt-3 shrink-0">
                    <Card className="p-3">
                        <p className="text-[10px] font-bold uppercase tracking-widest text-uber-gray-400 mb-2">Live pickup timeline</p>
                        <div className="flex gap-2 overflow-x-auto pb-1">
                            {pricing.sorted.map((r, i) => {
                                const pr = pricing.perRider[r.id];
                                return <div key={r.id} className="min-w-[78px] text-center">
                                    <div className={`mx-auto w-7 h-7 rounded-full flex items-center justify-center ${i<=pickupIndex?'bg-uber-success text-white':i===pickupIndex+1?'bg-uber-black text-white':'bg-uber-gray-100 text-uber-gray-400'}`}>
                                        <Icon name={i<=pickupIndex?'check':i===pickupIndex+1?'directions_car':'schedule'} size={14}/>
                                    </div>
                                    <p className="text-[10px] font-semibold mt-1 truncate">{r.name}</p>
                                    <p className="text-[9px] text-uber-gray-400">{i<=pickupIndex?'Picked up':i===pickupIndex+1?'Current':'Upcoming'}</p>
                                    <p className="text-[9px] font-bold text-uber-gray-500">${pr?.discountedTotal.toFixed(2)}</p>
                                </div>;
                            })}
                            <div className="min-w-[78px] text-center">
                                <div className={`mx-auto w-7 h-7 rounded-full flex items-center justify-center ${allAboard?'bg-uber-black text-white':'bg-uber-gray-100'}`}><Icon name="location_on" size={14}/></div>
                                <p className="text-[10px] font-semibold mt-1">Arrival</p>
                                <p className="text-[9px] text-uber-gray-400">{DESTINATION.eta}</p>
                            </div>
                        </div>
                    </Card>
                </div>

                {/* Chat */}
                <div className="flex-1 px-4 mt-3 flex flex-col min-h-0">
                    <h3 className="font-display font-bold text-sm mb-2 shrink-0">Trip Activity</h3>
                    <div ref={chatRef} className="flex-1 bg-white rounded-xl border border-uber-gray-100 p-3 overflow-y-auto flex flex-col gap-2">
                        {messages.map((msg, i) => {
                            if (msg.type==='system' || msg.type==='alert') return (
                                <div key={i} className="self-center anim-fade">
                                    <div className={`inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full text-[11px] font-medium ${msg.type==='alert'?'bg-uber-warning/10 text-uber-warning border border-uber-warning/20':'bg-uber-gray-50 text-uber-gray-600'}`}>
                                        <Icon name={msg.icon||'info'} size={13} fill/>{msg.text}
                                    </div>
                                </div>
                            );
                            const isMe = msg.type==='user' && msg.name==='Alex';
                            const isDriver = msg.type==='driver';
                            return (
                                <div key={i} className={`flex flex-col gap-0.5 max-w-[80%] anim-slide ${isMe||isDriver?'self-end items-end':'self-start items-start'}`}>
                                    <div className={`px-3 py-2 rounded-2xl text-sm ${isDriver?'bg-uber-black text-white rounded-br-sm':isMe?'bg-uber-gray-100 rounded-br-sm':'bg-uber-gray-100 rounded-bl-sm'}`}>{msg.text}</div>
                                    <span className="text-[10px] text-uber-gray-400">{msg.name}{isDriver?' (Driver)':''} - {msg.time}</span>
                                </div>
                            );
                        })}
                    </div>
                </div>

                {/* Input */}
                <div className="px-4 py-2 shrink-0">
                    <div className="flex gap-2 items-center bg-white rounded-xl border border-uber-gray-200 px-3 h-11">
                        <input value={inputVal} onChange={e=>setInputVal(e.target.value)} onKeyDown={e=>e.key==='Enter'&&sendMsg()} className="flex-1 text-sm bg-transparent border-none p-0" placeholder="Message group..."/>
                        <button aria-label="Attach a photo" onClick={() => addToast('Photo attachment ready.', 'info')} className="text-uber-gray-500"><Icon name="add_photo_alternate" size={19}/></button>
                        <button onClick={sendMsg} className="text-uber-black"><Icon name="send" size={20} fill/></button>
                    </div>
                </div>

                {/* Actions */}
                <div className="px-4 pb-2 shrink-0 flex gap-2">
                    <Btn variant="secondary" onClick={() => showModal({icon:'emergency',iconBg:'bg-red-50',iconColor:'text-uber-danger',title:'Safety emergency',body:'Contact emergency services or Uber Safety. Your Group Trip will continue for other vehicles. Emergency triggered by one rider does not cancel other vehicles.',actions:[{label:'Call emergency services',variant:'danger',action:()=>addToast('Emergency support contacted.', 'error')},{label:'Cancel',variant:'secondary'}]})} full={false} className="px-3" icon="emergency">Safety</Btn>
                    <Btn variant="secondary" onClick={() => nav('/complete')}>Simulate Arrival</Btn>
                </div>
            </main>
        </div>
    );
};

/* ═══════════════════════════════════════════
   SCREEN 7  -  TRIP COMPLETION (PRD §7.8)
   ═══════════════════════════════════════════ */
const CompletionPage = () => {
    const nav = useNavigate();
    const { riders, pricing, showModal } = useContext(TripContext);
    const discountPct = Math.round(pricing.discount * 100);

    const showReceipt = (rider) => {
        const pr = pricing.perRider[rider.id];
        if (!pr) return;
        showModal({
            icon: 'receipt_long',
            title: `${rider.name}'s Fare Breakdown`,
            body: '',
            content: (
                <div className="bg-uber-gray-50 rounded-lg p-3 space-y-2 text-sm">
                    <p className="font-bold">Your fare: ${pr.discountedTotal.toFixed(2)}</p>
                    {pr.legs.map((leg, i) => (
                        <div key={i} className="flex justify-between text-xs py-1 border-b border-uber-gray-100">
                            <span>{leg.from} &rarr; {leg.to}</span>
                            <span>${leg.yourShare.toFixed(2)}</span>
                        </div>
                    ))}
                    <div className="flex justify-between text-xs text-uber-success pt-1">
                        <span>Group discount ({discountPct}%)</span>
                        <span>-${pr.discountAmount.toFixed(2)}</span>
                    </div>
                    <div className="border-t-2 border-uber-gray-300 pt-2 mt-1">
                        <div className="flex justify-between text-xs">
                            <span>Solo fare would have been</span>
                            <span className="line-through">${pr.soloFare.toFixed(2)}</span>
                        </div>
                        <div className="flex justify-between text-sm font-bold text-uber-success mt-1">
                            <span>You saved</span>
                            <span>${pr.savings.toFixed(2)} ({pr.savingsPct}%)</span>
                        </div>
                    </div>
                </div>
            ),
            actions: [{ label: 'Close', variant: 'secondary' }],
        });
    };

    return (
        <div className="min-h-screen bg-uber-gray-50">
            <TopBar title="Trip Completed"/>
            <main className="pt-14 pb-24 px-4">
                {/* Hero */}
                <div className="text-center py-8">
                    <div className="w-20 h-20 bg-uber-black rounded-full flex items-center justify-center mx-auto mb-4 anim-pop shadow-heavy">
                        <Icon name="check_circle" size={40} fill className="text-white"/>
                    </div>
                    <h2 className="font-display font-bold text-2xl anim-slide">Everyone arrived together.</h2>
                    <p className="text-sm text-uber-gray-500 mt-2 anim-slide max-w-xs mx-auto" style={{animationDelay:'.1s'}}>
                        Your group of {riders.length} arrived at {DESTINATION.name} in 32 minutes.
                    </p>
                </div>

                {/* Stats Grid - PRD §7.8 bento */}
                <div className="grid grid-cols-2 gap-3 mb-4">
                    <StatCard icon="savings" label="Total savings vs solo" value={`$${pricing.savings.toFixed(2)}`} sub={`${pricing.savingsPct}% cheaper than ${riders.length} solo rides`} accent className="col-span-2"/>
                    <StatCard icon="person" label="Per-rider range" value={`$${pricing.minCost?.toFixed(2)} - $${pricing.maxCost?.toFixed(2)}`}/>
                    <StatCard icon="group" label="Riders" value={riders.length}/>
                    <StatCard icon="directions_car" label="Vehicles" value={getVehiclePlan(riders.length).length}/>
                    <StatCard icon="payments" label="Group total" value={`$${pricing.discountedTotal.toFixed(2)}`} sub={`After ${discountPct}% discount`}/>
                </div>

                {/* Group Members with receipts */}
                <Card className="p-4 mb-4">
                    <h3 className="text-[11px] font-bold text-uber-gray-400 uppercase tracking-widest mb-3">Group Members - Tap for receipt</h3>
                    <div className="flex flex-wrap gap-4 justify-center">
                        {pricing.sorted.map((r, i) => {
                            const pr = pricing.perRider[r.id];
                            return (
                                <button key={r.id} onClick={() => showReceipt(r)} className="flex flex-col items-center gap-1 anim-pop" style={{animationDelay:`${i*.1}s`}}>
                                    <Avatar src={r.img} size={52}/>
                                    <span className="text-xs font-medium">{r.name}</span>
                                    <span className="text-[10px] font-bold">${pr?.discountedTotal.toFixed(2)}</span>
                                    <span className="text-[9px] text-uber-success">-{pr?.savingsPct}%</span>
                                </button>
                            );
                        })}
                    </div>
                </Card>

                {/* Fare Summary with discount line item */}
                <Card className="p-4 mb-4">
                    <div className="flex justify-between items-center">
                        <div>
                            <p className="text-xs text-uber-gray-400">Group Total</p>
                            <p className="font-display font-bold text-xl">${pricing.discountedTotal.toFixed(2)}</p>
                        </div>
                        <div className="text-right">
                            <p className="text-xs text-uber-gray-400">Solo Total</p>
                            <p className="font-display font-bold text-xl text-uber-gray-400 line-through">${pricing.soloTotal.toFixed(2)}</p>
                        </div>
                    </div>
                    <div className="mt-3 space-y-1.5">
                        <div className="flex justify-between text-xs">
                            <span className="text-uber-gray-500">Segment subtotal</span>
                            <span>${pricing.groupTotal.toFixed(2)}</span>
                        </div>
                        <div className="flex justify-between text-xs text-uber-success">
                            <span className="font-bold">Group discount ({discountPct}%)</span>
                            <span className="font-bold">-${pricing.discountAmount.toFixed(2)}</span>
                        </div>
                    </div>
                    <div className="flex items-center gap-2 mt-3 p-2 bg-uber-gray-50 rounded-lg">
                        <Icon name="receipt" size={16} className="text-uber-gray-400"/>
                        <span className="text-xs text-uber-gray-500">Receipt with segment breakdown sent to all riders</span>
                    </div>
                </Card>

                {/* Archive Note */}
                <Card className="p-4 flex gap-3 mb-4">
                    <Icon name="archive" size={18} className="text-uber-gray-400 mt-0.5 shrink-0"/>
                    <p className="text-xs text-uber-gray-500">This trip has been saved to your Trip History. All receipts with per-rider segment breakdowns are available in the Activity tab.</p>
                </Card>

                {/* Rating Prompt */}
                <Card className="p-4 mb-4 text-center">
                    <p className="text-sm font-semibold mb-2">How was your Group Trip?</p>
                    <div className="flex justify-center gap-1">
                        {[1,2,3,4,5].map(s => <button key={s} className="p-1 hover:scale-110 transition-transform"><Icon name="star" size={28} fill={s<=4} className={s<=4?'text-uber-black':'text-uber-gray-200'}/></button>)}
                    </div>
                </Card>

                <Btn onClick={() => nav('/')}>Done</Btn>
            </main>
        </div>
    );
};

/* ═══════════════════════════════════════════
   APP
   ═══════════════════════════════════════════ */
const App = () => (
    <MemoryRouter>
        <TripProvider>
            <Toast/>
            <Modal/>
            <Routes>
                <Route path="/" element={<HomePage/>}/>
                <Route path="/formation" element={<FormationPage/>}/>
                <Route path="/plan" element={<PlanPage/>}/>
                <Route path="/vehicles" element={<VehicleRecommendationPage/>}/>
                <Route path="/matching" element={<MatchingPage/>}/>
                <Route path="/confirmed" element={<ConfirmedPage/>}/>
                <Route path="/trip-room" element={<TripRoomPage/>}/>
                <Route path="/complete" element={<CompletionPage/>}/>
                <Route path="/activity" element={<ConfirmedPage/>}/>
                <Route path="/account" element={<CompletionPage/>}/>
                <Route path="/safety" element={<HomePage/>}/>
            </Routes>
        </TripProvider>
    </MemoryRouter>
);

createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
